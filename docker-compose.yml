services:
  nginx:
    image: nginx:alpine
    container_name: taram-proxy
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: taram-backend
    # ports: - "8080:8080" # No longer exposed directly
    environment:
      - DATABASE_URL=file:./dev.db
      - PORT=8080
      - NODE_ENV=production
      - SMTP_HOST=maildev
      - SMTP_PORT=1025
    depends_on:
      - maildev
    restart: unless-stopped

  maildev:
    image: maildev/maildev
    container_name: taram-maildev
    ports:
      - "1080:1080"
      - "1025:1025"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: taram-frontend
    # ports: - "3000:80" # No longer exposed directly
    depends_on:
      - backend
    restart: unless-stopped
