services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: taram-backend
    ports:
      - "8080:8080"
    environment:
      - NODE_ENV=production
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: taram-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
